<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kai 말하기 산술 워크시트</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: #F4F2FB;
    color: #2C2440;
    padding: 16px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 24px;
    margin: 8px 0 4px;
    color: #5B3DBE;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #8478AC;
    margin-bottom: 18px;
    line-height: 1.6;
  }
  .support-banner {
    background: #FFF3CD;
    color: #8A6D00;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    text-align: center;
    margin-bottom: 18px;
    display: none;
  }
  .support-banner.show { display: block; }
  .progress-bar {
    height: 8px;
    background: #E4DEF7;
    border-radius: 6px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #7C5CE0;
    width: 0%;
    transition: width .3s;
  }
  .stage-section { margin-bottom: 22px; }
  .stage-title {
    font-size: 16px;
    font-weight: 700;
    color: #5B3DBE;
    margin: 0 0 10px 4px;
  }
  .problem-card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 3px 10px rgba(91,61,190,0.08);
  }
  .equation {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .equation .blank { color: #E0584F; }
  .equation-blocks {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .equation-blocks .num-block {
    height: 86px;
    width: auto;
  }
  .equation-blocks .op-symbol {
    font-size: 28px;
    font-weight: 700;
    color: #5B3DBE;
  }
  .equation-blocks .blank {
    font-size: 28px;
    font-weight: 700;
  }

  .response-block {
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    border: 2px solid #EDE9F9;
  }
  .response-block.correct { border-color: #4CAF8A; background: #F2FBF6; }
  .response-block.wrong { border-color: #E0584F; background: #FDF2F1; }
  .response-block:last-child { margin-bottom: 0; }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .response-label {
    font-size: 12px;
    font-weight: 700;
    color: #8478AC;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .response-hint {
    font-size: 12px;
    color: #B6ABD6;
    margin-top: 2px;
  }
  .mic-btn {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: #7C5CE0;
    color: #fff;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s, background .15s;
  }
  .mic-btn:active { transform: scale(0.92); }
  .mic-btn.listening { background: #E0584F; animation: pulse 1s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(224,88,79,0.5); }
    70% { box-shadow: 0 0 0 10px rgba(224,88,79,0); }
    100% { box-shadow: 0 0 0 0 rgba(224,88,79,0); }
  }
  .answer-row {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 24px;
    font-size: 14px;
    flex-wrap: wrap;
  }
  .heard-label { color: #8478AC; }
  .heard-value { font-weight: 700; font-size: 15px; }
  .result-tag {
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
  }
  .result-tag.ok { background: #DFF3E7; color: #2E7D32; }
  .result-tag.no { background: #FBE3E1; color: #C62828; }
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: #A89BC9;
    margin-top: 24px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎙️ Kai 말하기 산술 워크시트</h1>
  <div class="subtitle">
    응답1: 답을 <b>단어</b>로만 말해보세요<br>
    응답2: 답을 <b>전체 문장</b>으로 말해보세요
  </div>
  <div class="support-banner" id="supportBanner">
    이 기기/브라우저는 음성 인식을 지원하지 않을 수 있어요. 크롬(Chrome) 브라우저 사용을 추천해요.
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div id="stagesContainer"></div>

  <div class="footer-note">
    마이크 사용을 허용해주세요. 인식이 잘 안 되면 마이크에 가까이서 또박또박 다시 말해보세요.
  </div>
</div>

  function opWord(op){ return op === '+' ? 'plus' : 'minus'; }

  stages.forEach(stage => {
    stage.problems.forEach(prob => {
      if (prob.eqText === undefined){
        // construct from a/op/b (and optional c/op2)

  // ===== English number word -> digit mapping (word-response parsing) =====
  const englishNumberMap = {
    'zero':0,'one':1,'won':1,'two':2,'to':2,'too':2,'three':3,'tree':3,'four':4,'for':4,'fore':4,
    'five':5,'six':6,'sicks':6,'seven':7,'eight':8,'ate':8,'nine':9,'ten':10,
    'eleven':11,'twelve':12
  };
  // ===== Korean fallback (in case Kai answers in Korean) =====
  const koreanNumberMap = {
    '영':0,'공':0,'일':1,'하나':1,'한':1,'이':2,'둘':2,'두':2,'삼':3,'셋':3,'세':3,
    '사':4,'넷':4,'네':4,'오':5,'다섗':5,'다섯':5,'육':6,'여섗':6,'여섯':6,
    '칠':7,'일곱':7,'팔':8,'여덟':8,'구':9,'아홉':9,'십':10,'열':10,
    '십일':11,'열하나':11,'십이':12,'열둘':12
  };

  function parseSpokenNumber(text){
    const cleaned = text.trim().toLowerCase().replace(/[.,!?]+/g, '');
    const digitMatch = cleaned.match(/-?\d+/);
    if (digitMatch) return parseInt(digitMatch[0], 10);
    const enKeys = Object.keys(englishNumberMap).sort((a,b)=>b.length-a.length);
    for (const k of enKeys){
      if (new RegExp('\\b' + k + '\\b').test(cleaned)) return englishNumberMap[k];
    }
    const koCleaned = text.trim().replace(/[.,!?\s]+/g, '');
    const koKeys = Object.keys(koreanNumberMap).sort((a,b)=>b.length-a.length);
    for (const k of koKeys){
      if (koCleaned.includes(k)) return koreanNumberMap[k];
    }
    return null;
  }

  // Flexible sentence grading: check that every required word (numbers translated
  // to digits, operator words, "equals") appears somewhere in the transcript,
  // in any order/spacing. This tolerates minor misrecognitions of connecting words.
  function gradeSentence(transcript, template, blankAnswer){
    const cleaned = ' ' + transcript.trim().toLowerCase().replace(/[.,!?]+/g, '') + ' ';
    const requiredWords = template.map(tok => tok === 'BLANK' ? numWords[blankAnswer] : tok);
    // For each concept, list acceptable forms. Symbols (+, -) don't have word
    // boundaries, so they're matched as plain substrings, not \b-wrapped regex.
    const altWords = {
      'plus': { words: ['plus'], symbols: ['+'] },
      'minus': { words: ['minus'], symbols: ['-', '−'] },
      'equals': { words: ['equals', 'equal', 'is'], symbols: ['='] }
    };
    const missing = [];
    requiredWords.forEach(word => {
      const alt = altWords[word];
      let found = false;
      if (alt){
        found = alt.words.some(w => new RegExp('\\b' + w + '\\b').test(cleaned))
             || alt.symbols.some(s => cleaned.includes(s));
      } else {
        found = new RegExp('\\b' + word + '\\b').test(cleaned);
      }
      // Speech recognition often transcribes spoken numbers as digits (e.g. "5" instead
      // of "five"). Treat the digit form as an accepted equivalent for number words.
      if (!found){
        const digitIndex = numWords.indexOf(word);
        if (digitIndex !== -1){
          found = new RegExp('\\b' + digitIndex + '\\b').test(cleaned);
        }
      }
      if (!found) missing.push(word);
    });
    return { pass: missing.length === 0, missing };
  }

  // ===== Build UI =====
  const container = document.getElementById('stagesContainer');
  const progressFill = document.getElementById('progressFill');
  let totalResponses = 0;
  let answeredCount = 0;

  stages.forEach(stage => {
    const section = document.createElement('div');
    section.className = 'stage-section';
    const title = document.createElement('div');
    title.className = 'stage-title';
    title.textContent = stage.title;
    section.appendChild(title);

    stage.problems.forEach(prob => {
      totalResponses += 2; // word response + sentence response

      const card = document.createElement('div');
      card.className = 'problem-card';

      const eqDiv = document.createElement('div');
      if (prob.useBlocks){
        eqDiv.className = 'equation equation-blocks';
        const opSymbol = (o) => o === '+' ? '+' : '−';
        let html =
          '<img class="num-block" src="' + blockImageB64[prob.a] + '" alt="' + prob.a + '블럭">' +
          '<span class="op-symbol">' + opSymbol(prob.op) + '</span>' +
          '<img class="num-block" src="' + blockImageB64[prob.b] + '" alt="' + prob.b + '블럭">';
        if (prob.c !== undefined){
          html +=
            '<span class="op-symbol">' + opSymbol(prob.op2) + '</span>' +
            '<img class="num-block" src="' + blockImageB64[prob.c] + '" alt="' + prob.c + '블럭">';
        }
        html += '<span class="op-symbol">=</span><span class="blank">?</span>';
        eqDiv.innerHTML = html;
      } else {
        eqDiv.className = 'equation';
        eqDiv.innerHTML = prob.eqText.replace('？', '<span class="blank">？</span>').replace(/= $/, '= <span class="blank">?</span>');
      }
      card.appendChild(eqDiv);

      // Response 1: word only
      const r1 = document.createElement('div');
      r1.className = 'response-block';
      r1.innerHTML =
        '<div class="response-header">' +
          '<div><div class="response-label">응답1 · 단어로 말하기</div></div>' +
          '<button class="mic-btn" aria-label="단어로 답 말하기">🎤</button>' +
        '</div>' +
        '<div class="answer-row"><span class="heard-label">들은 답:</span><span class="heard-value">—</span></div>';
      card.appendChild(r1);

      // Response 2: full sentence
      const r2 = document.createElement('div');
      r2.className = 'response-block';
      r2.innerHTML =
        '<div class="response-header">' +
          '<div><div class="response-label">응답2 · 문장으로 말하기</div></div>' +
          '<button class="mic-btn" aria-label="문장으로 답 말하기">🎤</button>' +
        '</div>' +
        '<div class="answer-row"><span class="heard-label">들은 문장:</span><span class="heard-value">—</span></div>';
      card.appendChild(r2);

      section.appendChild(card);

      // Wire up Response 1 (word)
      const mic1 = r1.querySelector('.mic-btn');
      const heard1 = r1.querySelector('.heard-value');
      const row1 = r1.querySelector('.answer-row');
      mic1.addEventListener('click', () => listenForWord(r1, mic1, heard1, row1, prob.answer, stage.id, prob.eqText));

      // Wire up Response 2 (sentence)
      const mic2 = r2.querySelector('.mic-btn');
      const heard2 = r2.querySelector('.heard-value');
      const row2 = r2.querySelector('.answer-row');
      mic2.addEventListener('click', () => listenForSentence(r2, mic2, heard2, row2, prob.sentenceTemplate, prob.answer, stage.id, prob.eqText));
    });

    container.appendChild(section);
  });

  // ===== Google Sheet logging =====
  // 아래 URL을 본인의 Google Apps Script 배포 URL로 교체하세요.
  // (apps_script_code.gs 안내에 따라 배포한 뒤 생성되는 "웹 앱 URL"을 붙여넣으면 됩니다)
  const SHEET_WEBHOOK_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';

  function logToSheet(payload){
    if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL.indexOf('PASTE_YOUR') === 0){
      return; // 아직 URL이 설정되지 않았으면 전송을 건너뜁니다
    }
    fetch(SHEET_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors', // Apps Script 웹앱은 CORS 응답을 안 주는 경우가 많아 no-cors로 보냄
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).catch(() => { /* 네트워크 오류는 조용히 무시 (학습 흐름을 막지 않기 위함) */ });
  }

  function updateProgress(){
    progressFill.style.width = Math.round((answeredCount/totalResponses)*100) + '%';
  }

  // ===== Speech recognition setup =====
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const supportBanner = document.getElementById('supportBanner');
  if (!SpeechRecognition){
    supportBanner.classList.add('show');
  }

  function describeError(event){
    if (event.error === 'no-speech') return '🔇 아무 소리도 못 들었어요. 마이크에 가까이서 다시 말해보세요';
    if (event.error === 'not-allowed' || event.error === 'service-not-allowed') return '🚫 마이크 권한이 꺼져 있어요. 브라우저 설정에서 마이크를 허용해주세요';
    if (event.error === 'audio-capture') return '🎤 마이크를 찾을 수 없어요. 마이크가 연결되어 있는지 확인해주세요';
    if (event.error === 'network') return '📶 인터넷 연결을 확인해주세요. 음성 인식은 온라인 연결이 필요해요';
    if (event.error === 'aborted') return '버튼을 다시 눌러서 시도해보세요';
    return '인식 오류가 발생했어요. 다시 시도해보세요';
  }

  function markResult(block, row, ok, tagTextOk, tagTextNo){
    const existingTag = row.querySelector('.result-tag');
    if (existingTag) existingTag.remove();
    const tag = document.createElement('span');
    tag.className = 'result-tag ' + (ok ? 'ok' : 'no');
    tag.textContent = ok ? tagTextOk : tagTextNo;
    row.appendChild(tag);
    block.classList.toggle('correct', ok);
    block.classList.toggle('wrong', !ok);
  }

  function listenForWord(block, micBtn, heardValueEl, answerRow, correctAnswer, stageId, eqText){
    if (!SpeechRecognition){ heardValueEl.textContent = '음성 인식 미지원'; return; }
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;

    micBtn.classList.add('listening');
    heardValueEl.textContent = '듣는 중...';
    const wasAnswered = block.classList.contains('correct') || block.classList.contains('wrong');

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      const parsed = parseSpokenNumber(transcript);
      if (parsed === null){
        heardValueEl.textContent = '"' + transcript + '" (숫자를 못 찾았어요)';
        block.classList.remove('correct','wrong');
        const existingTag = answerRow.querySelector('.result-tag');
        if (existingTag) existingTag.remove();
        logToSheet({
          stageId: stageId, eqText: eqText, responseType: '단어',
          transcript: transcript, parsedAnswer: null, correctAnswer: correctAnswer, isCorrect: false
        });
      } else {
        heardValueEl.textContent = parsed;
        const isCorrect = parsed === correctAnswer;
        markResult(block, answerRow, isCorrect, '✅ 정답', '❌ 다시 시도');
        if (!wasAnswered){ answeredCount++; updateProgress(); }
        logToSheet({
          stageId: stageId, eqText: eqText, responseType: '단어',
          transcript: transcript, parsedAnswer: parsed, correctAnswer: correctAnswer, isCorrect: isCorrect
        });
      }
    };
    recognition.onerror = (event) => { heardValueEl.textContent = describeError(event); };
    recognition.onend = () => { micBtn.classList.remove('listening'); };
    recognition.start();
  }

  function listenForSentence(block, micBtn, heardValueEl, answerRow, template, blankAnswer, stageId, eqText){
    if (!SpeechRecognition){ heardValueEl.textContent = '음성 인식 미지원'; return; }
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;

    micBtn.classList.add('listening');
    heardValueEl.textContent = '듣는 중...';
    const wasAnswered = block.classList.contains('correct') || block.classList.contains('wrong');

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      heardValueEl.textContent = '"' + transcript + '"';
      const { pass, missing } = gradeSentence(transcript, template, blankAnswer);
      const existingTag = answerRow.querySelector('.result-tag');
      if (existingTag) existingTag.remove();
      if (pass){
        markResult(block, answerRow, true, '✅ 정답', '');
      } else {
        markResult(block, answerRow, false, '', '❌ "' + missing.join(', ') + '" 빠짐');
      }
      if (!wasAnswered){ answeredCount++; updateProgress(); }
      logToSheet({
        stageId: stageId, eqText: eqText, responseType: '문장',
        transcript: transcript, parsedAnswer: '', correctAnswer: blankAnswer, isCorrect: pass
      });
    };
    recognition.onerror = (event) => { heardValueEl.textContent = describeError(event); };
    recognition.onend = () => { micBtn.classList.remove('listening'); };
    recognition.start();
  }

  updateProgress();
</script>
</body>
